databases:
  - name: alphora-db
    plan: free
    databaseName: alphora
    user: alphora

services:
  # ── Backend (Node.js API) ─────────────────────────────────────────────────
  - type: web
    name: alphora-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: alphora-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SITE_URL
        value: https://alphora.onrender.com
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

  # ── Frontend (React static site) ─────────────────────────────────────────
  - type: web
    name: alphora-app
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: alphora-api
          type: web
          property: host
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
